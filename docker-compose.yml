name: futures-signal

services:
  futures-signal:
    build: .
    container_name: futures-signal
    restart: unless-stopped
    environment:
      APP_ENV: production
      LOAD_DOTENV: "false"
      ALLOW_CUSTOM_AI_BASE_URL: "false"
      HEALTHCHECK_ENABLED: "true"
      HEALTHCHECK_HOST: "0.0.0.0"
      HEALTHCHECK_PORT: "18080"
      HEALTHCHECK_PATH: "/healthz"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:18080:18080"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:18080/healthz', timeout=5).status == 200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    command: ["python", "-m", "futures_signal", "run"]
